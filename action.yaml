name: "Otto Airflow Upgrade"
description: "Scheduled, Otto-driven Airflow upgrades: detect the current Runtime + providers, bump to a safe target, have Otto migrate the DAG code for breaking changes, verify, and open a PR."
author: "Astronomer"
branding:
  icon: "arrow-up-circle"
  color: "purple"

inputs:
  astro-api-token:
    required: false
    default: ""
    description: "Astronomer API token for the Otto code-migration step. If empty, falls back to the ASTRO_API_TOKEN env var. When no token is available the action still opens the version-bump PR, but skips the Otto migration and flags breaking changes for manual review."
  astro-domain:
    required: false
    default: "astronomer.io"
    description: "Astronomer domain. Override for non-prod (e.g. 'astronomer-dev.io')."
  astro-organization:
    required: false
    default: ""
    description: "Astronomer organization ID for gateway routing. Falls back to the ASTRO_ORGANIZATION env var."
  github-token:
    required: false
    default: ${{ github.token }}
    description: "Token used to push the branch and open/update the PR. Needs contents:write and pull-requests:write. To have the upgrade PR itself trigger your other CI workflows, supply a PAT or GitHub App token instead of the default GITHUB_TOKEN."
  project-path:
    required: false
    default: "."
    description: "Path to the Astro project root (the directory containing the Dockerfile and requirements.txt)."
  target:
    required: false
    default: "latest-minor"
    description: "How far to bump the Runtime: 'patch' (newest build on the current Airflow minor), 'latest-minor' (newest Runtime within the current Airflow major), or 'latest' (newest stable Runtime). Always clamped by max-upgrade-scope."
  max-upgrade-scope:
    required: false
    default: "minor"
    description: "Safety clamp on how big a jump may be auto-authored: 'patch', 'minor', or 'major'. Majors are advisory-only regardless of this value — a scheduled bot never auto-authors an Airflow major migration; it surfaces it for the guided upgrade instead."
  include-providers:
    required: false
    default: "true"
    description: "Also bump pinned 'apache-airflow-providers-*' entries in requirements.txt. Unpinned providers are reported but never changed."
  verify-level:
    required: false
    default: "parse"
    description: "Post-upgrade verification: 'parse' (default — build the project's Docker image at the target Runtime and run Astro's DAG integrity tests inside it; catches image-build failures and verifies DAGs in the production-faithful environment; needs Docker, falls back to 'import' without it), 'import' (import the discovered DAG + plugin files in a PyPI-built env), 'syntax' (byte-compile only), or 'none'. Verification fails only on a NEW failure the upgrade introduces — failures that already occur at your current versions are reported but don't fail the run; env/setup problems report 'skipped'."
  deprecation-cleanup:
    required: false
    default: "fix"
    description: "Deprecated-Airflow-usage sweep (ruff AIR3 rules, dags/+plugins/+include/ only) beyond the hop's own migrations: 'fix' (default — mechanically rewrite what ruff can, e.g. operators moved to providers; remaining debt is listed in the PR), 'advisory' (only list the debt, change nothing), or 'off'. 'fix' auto-demotes to advisory when the target Airflow is not 3.x (the rewrites produce Airflow 3 forms) or when verify-level is below 'import' (nothing would gate the rewrites). Your own ruff excludes, per-file-ignores, and noqa comments are honored."
  base-branch:
    required: false
    default: ""
    description: "PR base branch. Empty uses the currently checked-out branch."
  branch:
    required: false
    default: "otto/airflow-upgrade"
    description: "Head branch for the rolling upgrade PR. Re-runs force-push to it and update the same PR in place rather than opening a new one each run."
  labels:
    required: false
    default: "airflow-upgrade,dependencies"
    description: "Comma-separated labels applied to the PR (best-effort; missing labels are skipped with a warning)."
  model:
    required: false
    default: ""
    description: "Model identifier passed to Otto via --model. Empty uses Otto's default."
  astro-cli-version:
    required: false
    default: ""
    description: "Astro CLI version to install for the Otto step. Empty installs the latest published version (recommended). Only consulted when the Otto migration step runs."
  dry-run:
    required: false
    default: "false"
    description: "Compute the plan, apply the bumps locally, and write the would-be PR body to the job summary — but do not push or open a PR. Use this to preview what the action would do."

outputs:
  current-runtime:
    description: "Detected current Runtime tag."
    value: ${{ steps.resolve.outputs.current-runtime }}
  target-runtime:
    description: "Resolved target Runtime tag."
    value: ${{ steps.resolve.outputs.target-runtime }}
  overall-scope:
    description: "Largest tier across the resolved plan (after pin reconciliation): patch, minor, major, or none."
    value: ${{ steps.reconcile.outputs.overall-tier || steps.resolve.outputs.overall-tier }}
  no-update:
    description: "'true' when nothing is behind and the action no-ops."
    value: ${{ steps.reconcile.outputs.no-update || steps.resolve.outputs.no-update }}
  verify-status:
    description: "Verification result: passed, failed, or skipped (skipped when verification didn't run)."
    value: ${{ steps.verify.outputs.status || 'skipped' }}
  security-fixes:
    description: "Count of security fixes listed in the Runtime release notes for the target's release line — a lower bound for cross-line upgrades. 'unknown' when it couldn't be determined, empty when the runtime didn't change."
    value: ${{ steps.security.outputs.security-fixes }}
  pr-number:
    description: "Number of the opened/updated PR (empty in dry-run or no-op)."
    value: ${{ steps.open-pr.outputs.pr-number }}
  pr-url:
    description: "URL of the opened/updated PR (empty in dry-run or no-op)."
    value: ${{ steps.open-pr.outputs.pr-url }}
  branch:
    description: "Head branch the upgrade was committed to."
    value: ${{ steps.open-pr.outputs.branch }}

runs:
  using: "composite"
  steps:
    - name: Detect current versions
      id: detect
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        set -euo pipefail
        mkdir -p /tmp/otto-upgrade
        python3 "$GITHUB_ACTION_PATH/scripts/detect_versions.py" > /tmp/otto-upgrade/current.json
        echo "::group::Detected versions"
        cat /tmp/otto-upgrade/current.json
        echo "::endgroup::"

    - name: Resolve upgrade targets
      id: resolve
      shell: bash
      env:
        CURRENT_FILE: /tmp/otto-upgrade/current.json
        TARGET: ${{ inputs.target }}
        MAX_SCOPE: ${{ inputs.max-upgrade-scope }}
        INCLUDE_PROVIDERS: ${{ inputs.include-providers }}
      run: |
        set -euo pipefail
        python3 "$GITHUB_ACTION_PATH/scripts/resolve_target.py" > /tmp/otto-upgrade/plan.json
        echo "::group::Resolved plan"
        cat /tmp/otto-upgrade/plan.json
        echo "::endgroup::"
        P=/tmp/otto-upgrade/plan.json
        {
          echo "overall-tier=$(jq -r '.overall_tier' "$P")"
          echo "no-update=$(jq -r '.no_update' "$P")"
          echo "needs-migration=$(jq -r '.needs_migration' "$P")"
          echo "author-changes=$(jq -r '.author_changes' "$P")"
          echo "scope-exceeded=$(jq -r '.scope_exceeded' "$P")"
          echo "current-runtime=$(jq -r '.runtime.current_tag // ""' "$P")"
          echo "target-runtime=$(jq -r '.runtime.target_tag // ""' "$P")"
        } >> "$GITHUB_OUTPUT"
        if [[ "$(jq -r '.no_update' "$P")" == "true" ]]; then
          echo "Nothing to upgrade — everything is within scope of the latest available. No PR."
        fi

    - name: Apply version bumps
      id: apply
      if: steps.resolve.outputs.no-update != 'true' && steps.resolve.outputs.author-changes == 'true'
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        PLAN_FILE: /tmp/otto-upgrade/plan.json
      run: |
        set -euo pipefail
        python3 "$GITHUB_ACTION_PATH/scripts/apply_bump.py" > /tmp/otto-upgrade/apply.json
        echo "::group::Applied bumps"
        cat /tmp/otto-upgrade/apply.json
        echo "::endgroup::"

    - name: Resolve Otto auth
      id: auth
      # Runs for any real bump. Otto is mandatory: a real (PR-opening) run with
      # no token is a hard error — this action exists to migrate code with Otto,
      # not to ship unmigrated version bumps. The only tokenless path is a
      # dry-run preview, where Otto is simply skipped.
      if: steps.resolve.outputs.author-changes == 'true' && steps.resolve.outputs.no-update != 'true'
      shell: bash
      env:
        INPUT_ASTRO_API_TOKEN: ${{ inputs.astro-api-token }}
        INPUT_ASTRO_DOMAIN: ${{ inputs.astro-domain }}
        INPUT_ASTRO_ORGANIZATION: ${{ inputs.astro-organization }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        set -euo pipefail
        TOKEN="${INPUT_ASTRO_API_TOKEN:-${ASTRO_API_TOKEN:-}}"
        DOMAIN="${INPUT_ASTRO_DOMAIN:-${ASTRO_DOMAIN:-astronomer.io}}"
        ORG="${INPUT_ASTRO_ORGANIZATION:-${ASTRO_ORGANIZATION:-}}"
        if [[ -z "$TOKEN" || -z "$ORG" ]]; then
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::warning::No Astronomer token/organization — dry-run preview will skip the Otto migration (version/plan preview only)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::This action requires an Astronomer API token + organization (the upgrade is performed by Otto). Set 'astro-api-token'/'astro-organization' (or the ASTRO_API_TOKEN/ASTRO_ORGANIZATION env vars), or use 'dry-run: true' to preview without Otto."
          exit 1
        fi
        echo "::add-mask::$TOKEN"
        {
          echo "ASTRO_TOKEN=$TOKEN"
          echo "ASTRO_API_TOKEN=$TOKEN"
          echo "ASTRO_DOMAIN=$DOMAIN"
          echo "ASTRO_ORGANIZATION=$ORG"
        } >> "$GITHUB_ENV"
        echo "enabled=true" >> "$GITHUB_OUTPUT"

    - name: Install Astro CLI
      id: install
      # Needed by the Otto migration step AND by verify-level 'parse' (astro
      # dev parse builds + tests the image), which runs even in tokenless
      # dry-runs.
      if: >-
        steps.auth.outputs.enabled == 'true' ||
        (steps.resolve.outputs.author-changes == 'true' &&
         steps.resolve.outputs.no-update != 'true' &&
         inputs.verify-level == 'parse')
      uses: astronomer/setup-astro-cli@d8de1c738a79b83c057d185202557c894e33d2f7  # v0.0.1
      with:
        version: ${{ inputs.astro-cli-version }}

    - name: Verify Otto is available
      if: steps.auth.outputs.enabled == 'true'
      shell: bash
      env:
        CLI_VERSION: ${{ steps.install.outputs.cli-version }}
        CLI_PATH: ${{ steps.install.outputs.cli-path }}
      run: |
        set -euo pipefail
        echo "::group::Verify Otto"
        # Capture-then-grep (not `grep -q` on a pipe): `astro --help` is long
        # enough that grep closing the pipe early kills astro with SIGPIPE (141),
        # which pipefail would surface as a false negative. Mirrors AI-710 in
        # otto-review-action.
        help_out="$("$CLI_PATH" --help 2>&1 || true)"
        if ! printf '%s\n' "$help_out" | grep -qiE '^\s*otto\b'; then
          echo "::error::Astro CLI ${CLI_VERSION} at ${CLI_PATH} does not bundle Otto. Otto requires Astro CLI >= 1.42.0."
          exit 1
        fi
        # The migration step drives Otto's airflow-upgrade skill (assembled by
        # Core from the upgrade KB) using --output-schema for the structured
        # result. Confirm this Otto supports headless structured output.
        otto_help_out="$("$CLI_PATH" otto --help 2>&1 || true)"
        if ! printf '%s\n' "$otto_help_out" | grep -qE '\-\-output-schema\b'; then
          echo "::error::Astro CLI ${CLI_VERSION} bundles Otto but it lacks --output-schema (headless structured output). Update the Astro CLI to a build whose Otto supports headless structured output."
          exit 1
        fi
        echo "Astro CLI ${CLI_VERSION} bundles Otto with headless structured output."
        echo "::endgroup::"

    - name: Set up uv
      # uv backs two later steps: Otto's airflow-upgrade skill runs its mechanical
      # patcher via uv (observed: the skill reports the patcher "could not run"
      # when uv is absent), and verify-level=import builds an ephemeral target env
      # with it. Install it BEFORE Otto runs (so the patcher has it on PATH)
      # whenever Otto OR an import-level verify will run. The verify step reuses it.
      if: >-
        steps.resolve.outputs.author-changes == 'true' &&
        steps.resolve.outputs.no-update != 'true' &&
        (steps.auth.outputs.enabled == 'true' ||
         inputs.verify-level == 'import' || inputs.verify-level == 'parse' ||
         inputs.deprecation-cleanup != 'off')
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

    - name: Reconcile provider bumps with project pins
      id: reconcile
      # A bumped provider can be unsatisfiable next to the user's own pins.
      # Walk it back to the newest co-resolving version (plan note explains
      # which pin blocks the newer one) BEFORE the prompt is built, so Otto and
      # the PR see the final pin set. Best-effort: without uv this is skipped
      # and verification remains the backstop. Re-emits the plan aggregates —
      # a walk-back can shrink the overall tier, and the resolve step's
      # outputs were captured before reconciliation.
      if: >-
        steps.resolve.outputs.author-changes == 'true' &&
        steps.resolve.outputs.no-update != 'true'
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        PLAN_FILE: /tmp/otto-upgrade/plan.json
      run: |
        set -euo pipefail
        if command -v uv >/dev/null 2>&1; then
          python3 "$GITHUB_ACTION_PATH/scripts/co_resolve.py" > /tmp/otto-upgrade/co-resolve.json
          echo "::group::Pin reconciliation"
          cat /tmp/otto-upgrade/co-resolve.json
          echo "::endgroup::"
        else
          echo "uv unavailable; skipping pin reconciliation (verification will catch conflicts)."
        fi
        P=/tmp/otto-upgrade/plan.json
        {
          echo "overall-tier=$(jq -r '.overall_tier' "$P")"
          echo "needs-migration=$(jq -r '.needs_migration' "$P")"
          echo "no-update=$(jq -r '.no_update' "$P")"
          echo "author-changes=$(jq -r '.author_changes' "$P")"
        } >> "$GITHUB_OUTPUT"

    - name: Collect security fixes shipped by the Runtime upgrade
      id: security
      # Reads the public Runtime release notes so the PR can show the security
      # payoff of merging. Best-effort: a fetch miss or page-shape change is
      # reported loudly in the PR body, never fails the run.
      if: steps.resolve.outputs.no-update != 'true'
      shell: bash
      env:
        PLAN_FILE: /tmp/otto-upgrade/plan.json
      run: |
        set -euo pipefail
        python3 "$GITHUB_ACTION_PATH/scripts/security_fixes.py" > /tmp/otto-upgrade/security.json
        echo "::group::Security fixes"
        cat /tmp/otto-upgrade/security.json
        echo "::endgroup::"
        S=/tmp/otto-upgrade/security.json
        if [[ "$(jq -r '.status // ""' "$S")" == "ok" ]]; then
          echo "security-fixes=$(jq -r '.total' "$S")" >> "$GITHUB_OUTPUT"
        elif [[ "$(jq -r '.checked' "$S")" == "true" ]]; then
          echo "security-fixes=unknown" >> "$GITHUB_OUTPUT"
        fi

    - name: Build Otto prompt
      if: steps.auth.outputs.enabled == 'true'
      shell: bash
      env:
        WORKDIR: /tmp/otto-upgrade
        PLAN_FILE: /tmp/otto-upgrade/plan.json
        PROJECT_PATH: ${{ inputs.project-path }}
      run: bash "$GITHUB_ACTION_PATH/scripts/build-prompt.sh"

    - name: Run Otto migration
      if: steps.auth.outputs.enabled == 'true'
      shell: bash
      env:
        ASTRO_TOKEN: ${{ env.ASTRO_TOKEN }}
        ASTRO_API_TOKEN: ${{ env.ASTRO_API_TOKEN }}
        ASTRO_DOMAIN: ${{ env.ASTRO_DOMAIN }}
        ASTRO_ORGANIZATION: ${{ env.ASTRO_ORGANIZATION }}
        OTTO_X_ASTRO_CLIENT_IDENTIFIER: otto-upgrade-action
        OTTO_X_ASTRO_CLIENT_VERSION: ${{ github.action_ref }}
        ASTRO_CLI_PATH: ${{ steps.install.outputs.cli-path }}
        ACTION_PATH: ${{ github.action_path }}
        WORKDIR: /tmp/otto-upgrade
        INPUT_MODEL: ${{ inputs.model }}
      run: bash "$GITHUB_ACTION_PATH/scripts/run-otto.sh"

    - name: Deprecation cleanup
      # Runs AFTER Otto (sweeps what the migration didn't touch) and BEFORE
      # verification, so the parse-level check gates these rewrites exactly
      # like every other change in the PR. Best-effort: tooling misses are
      # reported in the PR body, never fail the run.
      if: >-
        inputs.deprecation-cleanup != 'off' &&
        steps.resolve.outputs.author-changes == 'true' &&
        steps.resolve.outputs.no-update != 'true'
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        PLAN_FILE: /tmp/otto-upgrade/plan.json
        DEPRECATION_MODE: ${{ inputs.deprecation-cleanup }}
        VERIFY_LEVEL: ${{ inputs.verify-level }}
      run: |
        set -euo pipefail
        python3 "$GITHUB_ACTION_PATH/scripts/deprecation_cleanup.py" > /tmp/otto-upgrade/deprecations.json
        echo "::group::Deprecation cleanup"
        cat /tmp/otto-upgrade/deprecations.json
        echo "::endgroup::"

    - name: Verify upgrade
      id: verify
      if: steps.resolve.outputs.author-changes == 'true' && steps.resolve.outputs.no-update != 'true'
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        PLAN_FILE: /tmp/otto-upgrade/plan.json
        VERIFY_LEVEL: ${{ inputs.verify-level }}
        WORKDIR: /tmp/otto-upgrade
        ACTION_PATH: ${{ github.action_path }}
      run: bash "$GITHUB_ACTION_PATH/scripts/verify.sh"

    - name: Open or update PR
      id: open-pr
      if: steps.resolve.outputs.author-changes == 'true' && steps.resolve.outputs.no-update != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PROJECT_PATH: ${{ inputs.project-path }}
        PLAN_FILE: /tmp/otto-upgrade/plan.json
        OTTO_FILE: /tmp/otto-upgrade/result.json
        VERIFY_FILE: /tmp/otto-upgrade/verify-report.md
        VERIFY_STATUS_FILE: /tmp/otto-upgrade/verify-status.txt
        SECURITY_FILE: /tmp/otto-upgrade/security.json
        DEPRECATION_FILE: /tmp/otto-upgrade/deprecations.json
        ACTION_PATH: ${{ github.action_path }}
        WORKDIR: /tmp/otto-upgrade
        BASE_BRANCH: ${{ inputs.base-branch }}
        BRANCH: ${{ inputs.branch }}
        LABELS: ${{ inputs.labels }}
        DRY_RUN: ${{ inputs.dry-run }}
        ACTION_REF: ${{ github.action_ref }}
      run: bash "$GITHUB_ACTION_PATH/scripts/open-pr.sh"

    - name: Major-upgrade advisory
      if: steps.resolve.outputs.author-changes != 'true' && steps.resolve.outputs.no-update != 'true'
      shell: bash
      run: |
        set -euo pipefail
        advisory=$(jq -r '.advisory // "A major upgrade is available."' /tmp/otto-upgrade/plan.json)
        echo "::warning::$advisory"
        if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
          { echo "# Airflow major upgrade available"; echo; echo "> $advisory"; } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Fail run on verification failure
      # Runs last, AFTER the PR is opened, so a failed verification still ships a
      # PR (with the failure flagged in its body) but the scheduled run goes red
      # so the maintainer notices. Merge-gating is the consumer repo's CI job.
      # Not in dry-run: a preview opens no PR (and, tokenless, skips the Otto
      # migration), so unmigrated bumped code "failing" verification is expected
      # and must not red the run or claim a PR was opened.
      if: steps.verify.outputs.status == 'failed' && inputs.dry-run != 'true'
      shell: bash
      run: |
        echo "::error::Verification found NEW failures at the target version (pre-existing issues alone never fail the run). A PR was opened with the failures flagged; do not merge until they're resolved."
        exit 1
