# Example consumer workflow. Copy into a customer's repo at
# .github/workflows/airflow-upgrade.yml and set the two secrets.
name: Airflow upgrade

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:       # also runnable on demand

permissions:
  contents: write          # push the upgrade branch
  pull-requests: write     # open/update the PR

# One upgrade run at a time — the rolling PR branch is force-pushed each run, so
# overlapping runs would race. Let an in-progress run finish rather than cancel.
concurrency:
  group: otto-airflow-upgrade
  cancel-in-progress: false

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't leave the write-scoped token in .git/config — the Otto step
          # (and the import-level verify) run repo code; the action pushes with
          # an explicit token instead.
          persist-credentials: false

      - uses: astronomer/otto-upgrade-action@v0
        with:
          astro-api-token: ${{ secrets.ASTRO_API_TOKEN }}
          astro-organization: ${{ secrets.ASTRO_ORGANIZATION }}
          # Reach for the newest Runtime within your current Airflow major,
          # but never auto-author a major migration.
          target: latest-minor
          max-upgrade-scope: minor
          # Where your Astro project lives, if not the repo root.
          # project-path: .
